<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gaming Website Navbar</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./aviatorstyle.css" />
  </head>
  <body>
    <nav class="navbar">
      <div class="logo">Gaming<span class="highlight">Zone</span></div>
      <ul class="nav-links">
        <li><a href="./index.html">Aviator</a></li>
        <li><a href="./spin.html">Spin</a></li>
      </ul>
      <div class="wallet">
        <i class="wallet-icon">&#128179;</i>
        <!-- Changed to a wallet emoji -->
        <span class="currency" id="nav_wallet">₹ 500</span>
      </div>
    </nav>

    <main>
      <div id="wrapper">
        <div id="mid-wrapper">
          <div id="header">
            <div id="last-counters"></div>
            <div>
              <div id="balance">BALANCE:</div>
              <div id="balance-amount">
                <div
                  style="
                    position: absolute;
                    top: 5px;
                    right: 10px;
                    font-size: 19px;
                    color: #ffffff;
                  "
                >
                  ₹
                </div>
              </div>
            </div>
          </div>

          <div id="counterWrapper">
            <div id="bg-image"></div>
            <canvas id="canvas"></canvas>
            <div id="counter">1.00</div>
          </div>

          <div id="bottom-wrapper">
            <div id="input-wrapper">
              <input
                type="number"
                id="bet-input"
                min="0"
                max="100"
                pattern="[0-9]{2}"
              />
              <div
                style="
                  position: absolute;
                  top: 10px;
                  right: 10px;
                  font-size: 19px;
                  color: #ffffff;
                "
              >
                ₹
              </div>
            </div>
            <button id="bet-button">BET</button>
          </div>

          <div id="message-button">
            <p id="message"></p>
          </div>
        </div>
      </div>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
